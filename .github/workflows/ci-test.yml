name: Test

on: 
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request: 
    types: [opened, reopened, synchronize]

jobs:
  Bench:
    runs-on: ubuntu-latest
    if: ${{github.event_name == 'workflow_dispatch'}}
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 
      uses: actions/setup-python@v3
      with:
        python-version : '3.10'
    - name: Bench v1.3.5 
      shell: bash 
      run: |
        set -eux
        mkdir old 
        cd old 
        python -m venv .venv --upgrade-deps
        source .venv/bin/activate
        python -m pip install jij-cimod==1.3.5
        cp ../bench.py ./
        python bench.py
    - name: Bench 
      shell: bash 
      run: |
        set -eux
        mkdir new
        cd new
        python -m venv .venv --upgrade-deps
        source .venv/bin/activate
        python -m pip install jij-cimod
        cp ../bench.py ./
        python bench.py
